name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  PNPM_VERSION: 11.9.0
  NODE_VERSION: 22

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza_typecheck
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @narraza/web typecheck
      - run: pnpm format:check

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/**" test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza_generate_only
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @narraza/db test:integration

  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm arch

  migration:
    name: Migration (empty + drift)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: narraza
          POSTGRES_PASSWORD: narraza
          POSTGRES_DB: narraza_migration
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U narraza -d narraza_migration"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza_migration
      SHADOW_DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza_migration_shadow
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Test migration scripts
        run: pnpm exec vitest run scripts/check-migration-drift.test.mjs packages/db/scripts/assert-expand-only.test.mjs packages/db/scripts/test-migrations.test.mjs
      - name: Verify expand-only migrations
        run: pnpm migration:expand-only
      - name: Migrate empty PostgreSQL 16
        run: pnpm migration:empty
      - name: Upgrade M0 fixture on PostgreSQL 16
        run: pnpm migration:upgrade
      - name: Create shadow database
        env:
          POSTGRES_CONTAINER_ID: ${{ job.services.postgres.id }}
        run: docker exec "$POSTGRES_CONTAINER_ID" createdb -U narraza narraza_migration_shadow
      - name: Deploy migrations to drift database
        run: pnpm --filter @narraza/db migrate:deploy
      - name: Verify migration and schema drift SQL is empty
        run: pnpm migration:drift

  security-smoke:
    name: Security Smoke
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      AUTH_SECRET: ci-auth-secret-000000000000000000000000
      RATE_LIMIT_PEPPER: ci-rate-pepper-11111111111111111111111
      EMAIL_TOKEN_PEPPER: ci-email-pepper-222222222222222222222
      DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza
      DATABASE_URL_WEB: postgresql://narraza:narraza@localhost:5432/narraza
      EMAIL_FROM: Narraza <no-reply@narraza.test>
      SMTP_URL: smtp://localhost:1025
      MICRO_IDR_PER_CREDIT: 10000000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm security:env-boundary
      - run: pnpm test:tooling
      - run: pnpm exec vitest run apps/web/src/app/m0-w05.test.ts
      - run: pnpm build
      - run: pnpm security:client-bundle

  contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contract

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: narraza
          POSTGRES_PASSWORD: narraza
          POSTGRES_DB: narraza_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U narraza -d narraza_e2e"
          --health-interval 5s --health-timeout 5s --health-retries 10
      mailpit:
        image: axllent/mailpit:v1.30.3
        ports: ['1025:1025', '8025:8025']
    env:
      NODE_ENV: development
      APP_URL: http://localhost:3000
      MAILPIT_API_URL: http://localhost:8025
      AUTH_SECRET: ci-auth-secret-000000000000000000000000
      RATE_LIMIT_PEPPER: ci-rate-pepper-11111111111111111111111
      EMAIL_TOKEN_PEPPER: ci-email-pepper-222222222222222222222
      DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza_e2e
      DATABASE_URL_WEB: postgresql://narraza:narraza@localhost:5432/narraza_e2e
      EMAIL_FROM: Narraza <no-reply@narraza.test>
      SMTP_URL: smtp://localhost:1025
      MICRO_IDR_PER_CREDIT: 10000000
      REGISTER_MAX_PER_HOUR_IP: 100
      LOGIN_MAX_FAILS_PER_HOUR_IP: 100
      EMAIL_TOKEN_MAX_PER_HOUR_IP: 100
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm build:packages
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
